<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        .markdown-body { line-height: 1.6; }
        .markdown-body h1, .markdown-body h2, .markdown-body h3 { margin-top: 1.5rem; margin-bottom: 1rem; font-weight: 700; }
        .markdown-body code { background-color: #f1f3f5; padding: 0.2rem 0.4rem; border-radius: 4px; font-size: 85%; }
        .markdown-body pre { background-color: #212529; color: #f8f9fa; padding: 1rem; border-radius: 8px; overflow-x: auto; }
        .markdown-body table { width: 100%; border-collapse: collapse; margin-bottom: 1rem; }
        .markdown-body th, .markdown-body td { border: 1px solid #dee2e6; padding: 0.75rem; text-align: left; }
        .markdown-body th { background-color: #f1f3f5; }
        .card { border: none; border-radius: 12px; }
        .card-header { border-top-left-radius: 12px !important; border-top-right-radius: 12px !important; font-weight: 600; }
        .navbar { backdrop-filter: blur(10px); background-color: rgba(33, 37, 41, 0.9) !important; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-md navbar-dark bg-dark fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">USB Device Monitoring Report</a>
        </div>
    </nav>

    <div class="container mt-5 pt-4 mb-5">
        <div class="row">
            <div class="col-lg-10 offset-lg-1">
                <!-- Video Section -->
                <div class="card shadow-sm mb-4">
                    <div class="card-header bg-dark text-white">Project Feedback & Learning Video</div>
                    <div class="card-body text-center p-0">
                        <div class="ratio ratio-16x9">
                            <div class="bg-light d-flex align-items-center justify-content-center border-bottom" style="height: 100%;">
                                <div class="text-center">
                                    <i class="bi bi-play-circle-fill display-1 text-primary"></i>
                                    <p class="mt-2 text-muted">Video Placeholder: [USB Device Monitoring Feedback & Learning]</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Detailed Info Section -->
                <div class="card shadow-sm">
                    <div class="card-body p-5 markdown-body">
                        {{ content|safe }}
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
